<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tööde Haldus</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Tööde Haldus</h1>
    
    <div class="status-boxes">
        <div class="status-box active"><span id="count-active">0</span>Aktiivsed</div>
        <div class="status-box in-progress"><span id="count-in-progress">0</span>Töös</div>
        <div class="status-box overdue"><span id="count-overdue">0</span>Hilinenud</div>
        <div class="status-box completed"><span id="count-completed">0</span>Valmis</div>
    </div>
    
    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#94a3b8"></div>Ootab</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Töös</div>
        <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>OK</div>
        <div class="legend-item"><div class="legend-dot" style="background:#eab308"></div>Varsti</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>Hilinenud</div>
    </div>
    
    <div class="toolbar">
        <div class="filters">
            <input type="text" id="filter-nr" placeholder="Töö Nr..." oninput="filterTable()">
            <input type="text" id="filter-koht" placeholder="Koht..." oninput="filterTable()">
        </div>
        
        <div class="toolbar-right">
            <label><input type="checkbox" id="show-hidden-dates" onchange="localStorage.setItem('showHiddenDates', this.checked); renderTable()"> Kuupäevad</label>
            <label><input type="checkbox" id="show-completed" onchange="filterTable()"> Valmis</label>
            <label><input type="checkbox" id="show-allhankes" onchange="filterTable()"> Allhange</label>
        </div>
        
        <button onclick="openModal()">+ Lisa uus</button>
        <button class="secondary" onclick="saveData()">Salvesta</button>
        <button class="secondary" onclick="document.getElementById('file-input').click()">Laadi</button>
        <button class="secondary" onclick="clearData()">Tühista</button>
        <input type="file" id="file-input" accept=".json,.js" style="display:none" onchange="loadFromFile(event)">
    </div>
    
    <div class="table-wrap">
    <table id="jobs-table">
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
    </table>
    </div>
    
    <div class="status-bar" id="status-bar" style="display:none"></div>
    
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2>Lisa uus töö</h2>
            <form id="add-form" onsubmit="addJob(event)">
                <div class="form-grid" id="form-grid"></div>
                <div class="modal-buttons">
                    <button type="button" class="secondary" onclick="closeModal()">Katkesta</button>
                    <button type="submit" class="primary">Lisa</button>
                </div>
            </form>
        </div>
    </div>

<script>
// === DATA ===
const COLUMNS = [
    'Töö Nr', 'Valmis', 'Valmis kpv',
    'Detaili/koostu nimetus või joonise Nr', 'Kommentaar(tooriku/detaili seis, muu oluline info)',
    'Otsuse/Tegevuse vastutaja', 'Tooriku saabumise kuupäev EE',
    'EE vajaduse kuupäev (koostamiseks valmis kujul)', 'Meeldetuletus X päeva ennem',
    'Töötluse algus', 'Alustatud', 'Alustamise kpv', 'EE töötluse lõpp',
    'Töötlus Lõpetatud', 'Töötlus allhankes', 'Täitmise koht',
    'EE kuupäev tarne', 'TE kuupäev tarne', 'Info sisestamise kuupäev',
    'Tegevuse sisestaja nimi'
];

const COLUMN_LABELS = {
    'Kommentaar(tooriku/detaili seis, muu oluline info)': 'Kommentaar',
    'Detaili/koostu nimetus või joonise Nr': 'Detail/koostu',
    'EE vajaduse kuupäev (koostamiseks valmis kujul)': 'EE vajadus',
    'Meeldetuletus X päeva ennem': 'Meeldetuletus',
    'Tegevuse sisestaja nimi': 'Sisestaja',
    'Otsuse/Tegevuse vastutaja': 'Vastutaja',
    'Tooriku saabumise kuupäev EE': 'Saabunud',
    'Valmis kpv': 'Valmis',
    'Alustamise kpv': 'Alustamine',
    'Töötluse algus': 'Töötlus algus',
    'EE töötluse lõpp': 'EE lõpp',
    'Info sisestamise kuupäev': 'Sisestatud',
    'EE kuupäev tarne': 'EE tarne',
    'TE kuupäev tarne': 'TE tarne',
    'Töötlus Lõpetatud': 'Lõpetatud',
    'Töötlus allhankes': 'Allhankes'
};

const COLUMN_WIDTHS = {
    'Töö Nr': 80, 'Valmis': 45, 'Valmis kpv': 85, 'Tegevuse sisestaja nimi': 70,
    'Detaili/koostu nimetus või joonise Nr': 120, 'Kommentaar(tooriku/detaili seis, muu oluline info)': 200,
    'Otsuse/Tegevuse vastutaja': 70, 'Tooriku saabumise kuupäev EE': 70,
    'EE vajaduse kuupäev (koostamiseks valmis kujul)': 90, 'Meeldetuletus X päeva ennem': 60,
    'Töötluse algus': 80, 'Alustatud': 55, 'Alustamise kpv': 85,
    'EE töötluse lõpp': 80, 'Töötlus Lõpetatud': 70, 'Töötlus allhankes': 70,
    'Täitmise koht': 90, 'EE kuupäev tarne': 80, 'TE kuupäev tarne': 80,
    'Info sisestamise kuupäev': 90
};

const DATE_COLS = ['Valmis kpv', 'Info sisestamise kuupäev',
    'EE vajaduse kuupäev (koostamiseks valmis kujul)', 'Töötluse algus',
    'Alustamise kpv', 'EE töötluse lõpp', 'EE kuupäev tarne', 'TE kuupäev tarne'];

const CHECKBOX_COLS = ['Valmis', 'Alustatud', 'Töötlus Lõpetatud', 'Töötlus allhankes'];
const HIDDEN_COLS = ['Valmis kpv', 'Alustamise kpv', 'Meeldetuletus X päeva ennem'];
const COLUMN_WRAP = ['Töötlus Lõpetatud', 'Töötlus allhankes'];

// Convert yyyy-mm-dd to dd.mm.yyyy
function formatDate(dateStr) {
    if (!dateStr) return '';
    if (/^\d{2}\.\d{2}\.\d{4}$/.test(dateStr)) return dateStr;
    const parts = dateStr.split('-');
    if (parts.length !== 3) return dateStr;
    return parts[2] + '.' + parts[1] + '.' + parts[0];
}

// Convert dd.mm.yyyy to yyyy-mm-dd for storage
function parseDate(dateStr) {
    if (!dateStr) return '';
    if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr;
    const parts = dateStr.split('.');
    if (parts.length !== 3) return dateStr;
    return parts[2] + '-' + parts[1] + '-' + parts[0];
}

function convertSaabunudDates() {
    let count = 0;
    jobs.forEach(job => {
        const val = job['Tooriku saabumise kuupäev EE'];
        if (val && /^\d{4}-\d{2}-\d{2}$/.test(val)) {
            const parts = val.split('-');
            job['Tooriku saabumise kuupäev EE'] = parts[2] + '.' + parts[1] + '.' + parts[0];
            count++;
        }
    });
    if (count > 0) {
        localStorage.setItem('jobsData', JSON.stringify(jobs));
    }
}

let calendarPopup = null;
let calendarCallback = null;
let calendarCurrentYear = null;
let calendarCurrentMonth = null;
let calendarSelectedDate = null;

function openDateCalendar(inputEl, currentValue, callback) {
    closeCalendarPopup();
    calendarPopup = inputEl;
    calendarCallback = callback;
    
    const today = new Date();
    let year = today.getFullYear();
    let month = today.getMonth();
    
    if (currentValue && /^\d{2}\.\d{2}\.\d{4}$/.test(currentValue)) {
        const parts = currentValue.split('.');
        year = parseInt(parts[2]);
        month = parseInt(parts[1]) - 1;
    }
    
    calendarCurrentYear = year;
    calendarCurrentMonth = month;
    calendarSelectedDate = currentValue;
    
    const popup = document.createElement('div');
    popup.className = 'calendar-popup active';
    popup.id = 'calendar-popup';
    
    const rect = inputEl.getBoundingClientRect();
    popup.style.left = rect.left + 'px';
    popup.style.top = (rect.bottom + 4) + 'px';
    
    document.body.appendChild(popup);
    renderCalendar();
    
    document.addEventListener('click', handleCalendarClickOutside);
}

function closeCalendarPopup() {
    const popup = document.getElementById('calendar-popup');
    if (popup) {
        popup.remove();
    }
    document.removeEventListener('click', handleCalendarClickOutside);
    calendarPopup = null;
    calendarCallback = null;
}

function handleCalendarClickOutside(e) {
    const popup = document.getElementById('calendar-popup');
    if (popup && (calendarCellTd || calendarPopup)) {
        if (!popup.contains(e.target)) {
            closeCalendarPopup();
            if (editingCell && editingCell.isDate) {
                finishEditing();
            }
        }
    }
}

function renderCalendar() {
    const popup = document.getElementById('calendar-popup');
    if (!popup) return;
    
    const monthNames = ['Jaanuar', 'Veebruar', 'Märts', 'Aprill', 'Mai', 'Juuni', 'Juuli', 'August', 'September', 'Oktoober', 'November', 'Detsember'];
    
    let html = '<div class="calendar-header">';
    html += '<button class="calendar-header-btn" onclick="event.stopPropagation();changeMonth(-1)">◀</button>';
    html += '<span class="calendar-month-year">' + monthNames[calendarCurrentMonth] + ' ' + calendarCurrentYear + '</span>';
    html += '<button class="calendar-header-btn" onclick="event.stopPropagation();changeMonth(1)">▶</button>';
    html += '</div>';
    
    html += '<div class="calendar-weekdays">';
    const weekdays = ['E', 'K', 'T', 'N', 'R', 'L', 'P'];
    weekdays.forEach(day => {
        html += '<span class="calendar-weekday">' + day + '</span>';
    });
    html += '</div>';
    
    html += '<div class="calendar-days">';
    
    const firstDay = new Date(calendarCurrentYear, calendarCurrentMonth, 1);
    const lastDay = new Date(calendarCurrentYear, calendarCurrentMonth + 1, 0);
    
    let startDay = firstDay.getDay() - 1;
    if (startDay < 0) startDay = 6;
    
    const today = new Date();
    const todayStr = String(today.getDate()).padStart(2, '0') + '.' + String(today.getMonth() + 1).padStart(2, '0') + '.' + today.getFullYear();
    
    for (let i = 0; i < startDay; i++) {
        const prevDate = new Date(calendarCurrentYear, calendarCurrentMonth, -startDay + i + 1);
        const day = prevDate.getDate();
        const dayStr = String(day).padStart(2, '0') + '.' + String(prevDate.getMonth() + 1).padStart(2, '0') + '.' + prevDate.getFullYear();
        const isSelected = dayStr === calendarSelectedDate;
        const isToday = dayStr === todayStr;
        html += '<span class="calendar-day' + (isSelected ? ' selected' : '') + (isToday ? ' today' : '') + '" data-date="' + dayStr + '" onclick="event.stopPropagation();selectDateCalendar(\'' + dayStr + '\')">' + day + '</span>';
    }
    
    for (let day = 1; day <= lastDay.getDate(); day++) {
        const dayStr = String(day).padStart(2, '0') + '.' + String(calendarCurrentMonth + 1).padStart(2, '0') + '.' + calendarCurrentYear;
        const isSelected = dayStr === calendarSelectedDate;
        const isToday = dayStr === todayStr;
        html += '<span class="calendar-day' + (isSelected ? ' selected' : '') + (isToday ? ' today' : '') + '" data-date="' + dayStr + '" onclick="event.stopPropagation();selectDateCalendar(\'' + dayStr + '\')">' + day + '</span>';
    }
    
    const totalCells = startDay + lastDay.getDate();
    const remainingCells = 42 - totalCells;
    for (let day = 1; day <= remainingCells; day++) {
        const nextDate = new Date(calendarCurrentYear, calendarCurrentMonth + 1, day);
        const dayStr = String(day).padStart(2, '0') + '.' + String(nextDate.getMonth() + 1).padStart(2, '0') + '.' + nextDate.getFullYear();
        const isSelected = dayStr === calendarSelectedDate;
        const isToday = dayStr === todayStr;
        html += '<span class="calendar-day other-month' + (isSelected ? ' selected' : '') + (isToday ? ' today' : '') + '" data-date="' + dayStr + '" onclick="event.stopPropagation();selectDateCalendar(\'' + dayStr + '\')">' + day + '</span>';
    }
    
    html += '</div>';
    html += '<button class="calendar-today-btn" onclick="event.stopPropagation();selectTodayCalendar()">Täna</button>';
    
    popup.innerHTML = html;
}

function changeMonth(delta) {
    calendarCurrentMonth += delta;
    if (calendarCurrentMonth > 11) {
        calendarCurrentMonth = 0;
        calendarCurrentYear++;
    } else if (calendarCurrentMonth < 0) {
        calendarCurrentMonth = 11;
        calendarCurrentYear--;
    }
    renderCalendar();
}

function selectDateCalendar(dateStr) {
    if (calendarRowIndex !== null && calendarColName) {
        selectDateCalendarDirect(dateStr);
    } else if (calendarCallback) {
        calendarCallback({ value: dateStr });
    }
    closeCalendarPopup();
}

function selectTodayCalendar() {
    const today = new Date();
    const dayStr = String(today.getDate()).padStart(2, '0') + '.' + String(today.getMonth() + 1).padStart(2, '0') + '.' + today.getFullYear();
    if (calendarRowIndex !== null && calendarColName) {
        selectDateCalendarDirect(dayStr);
    } else {
        selectDateCalendar(dayStr);
    }
}

function openDateCalendarDirect(td, index, col, currentValue) {
    closeCalendarPopup();
    calendarCellTd = td;
    calendarRowIndex = index;
    calendarColName = col;
    
    const today = new Date();
    let year = today.getFullYear();
    let month = today.getMonth();
    
    if (currentValue && /^\d{2}\.\d{2}\.\d{4}$/.test(currentValue)) {
        const parts = currentValue.split('.');
        year = parseInt(parts[2]);
        month = parseInt(parts[1]) - 1;
    }
    
    calendarCurrentYear = year;
    calendarCurrentMonth = month;
    calendarSelectedDate = currentValue;
    
    const popup = document.createElement('div');
    popup.className = 'calendar-popup active';
    popup.id = 'calendar-popup';
    
    const rect = td.getBoundingClientRect();
    popup.style.left = rect.left + 'px';
    popup.style.top = (rect.bottom + 4) + 'px';
    
    document.body.appendChild(popup);
    renderCalendar();
    
    document.addEventListener('click', handleCalendarClickOutside);
}

let calendarCellTd = null;
let calendarRowIndex = null;
let calendarColName = null;

function selectDateCalendarDirect(dateStr) {
    if (calendarRowIndex !== null && calendarColName) {
        jobs[calendarRowIndex][calendarColName] = dateStr;
        if (calendarCellTd) {
            calendarCellTd.innerHTML = dateStr;
            calendarCellTd.classList.remove('editing');
            calendarCellTd.onclick = null;
        }
        autoSave();
        renderTableBody();
        updateStats();
    }
    closeCalendarPopup();
}

function closeCalendarPopup() {
    const popup = document.getElementById('calendar-popup');
    if (popup) {
        popup.remove();
    }
    document.removeEventListener('click', handleCalendarClickOutside);
    calendarPopup = null;
    calendarCallback = null;
    calendarCellTd = null;
    calendarRowIndex = null;
    calendarColName = null;
}

let jobs = [];
let editingCell = null;
const DEADLINE_WARNING_DAYS = 7;
let sortColumn = null, sortDirection = 'asc';
let columnWidths = {}, hiddenColumns = {};

function getStatus(job) {
    if (job['Valmis']) return 'completed';
    if (job['Alustatud']) return 'in-progress';
    const deadline = job['EE vajaduse kuupäev (koostamiseks valmis kujul)'];
    if (!deadline) return 'waiting';
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const deadlineDate = new Date(deadline); deadlineDate.setHours(0, 0, 0, 0);
    const diffDays = Math.ceil((deadlineDate - today) / (1000 * 60 * 60 * 24));
    if (diffDays < 0) return 'overdue';
    if (diffDays <= DEADLINE_WARNING_DAYS) return 'soon';
    return 'ok';
}

function loadColumnWidths() {
    columnWidths = {};
    const saved = localStorage.getItem('jobsColumnWidths');
    if (saved) { try { columnWidths = JSON.parse(saved); } catch (e) { columnWidths = {}; } }
}

function saveColumnWidths() {
    localStorage.setItem('jobsColumnWidths', JSON.stringify(columnWidths));
}

function loadHiddenColumns() {
    hiddenColumns = {};
    const saved = localStorage.getItem('jobsHiddenColumns');
    if (saved) { try { hiddenColumns = JSON.parse(saved); } catch (e) { hiddenColumns = {}; } }
}

function saveHiddenColumns() {
    localStorage.setItem('jobsHiddenColumns', JSON.stringify(hiddenColumns));
}

let resizingTh = null;
let justResized = false;
let didResize = false;

function startResize(e, th) {
    if (e.target.tagName === 'SPAN') return;
    didResize = false;
    justResized = false;
    resizingTh = th;
    const startX = e.pageX, startWidth = th.offsetWidth;

    function doResize(ev) {
        if (!resizingTh) return;
        didResize = true;
        const diff = ev.pageX - startX;
        const newWidth = Math.max(25, startWidth + diff);
        const col = resizingTh.getAttribute('data-col');
        resizingTh.style.minWidth = newWidth + 'px';
        columnWidths[col] = newWidth;
    }

    function stopResize() {
        if (resizingTh) {
            saveColumnWidths();
            resizingTh = null;
            if (didResize) {
                justResized = true;
                setTimeout(() => { justResized = false; }, 200);
            }
            didResize = false;
        }
        document.removeEventListener('mousemove', doResize);
        document.removeEventListener('mouseup', stopResize);
    }

    document.addEventListener('mousemove', doResize);
    document.addEventListener('mouseup', stopResize);
}

function init() {
    loadHiddenColumns();
    loadColumnWidths();
    
    // Load checkbox states
    const showHidden = localStorage.getItem('showHiddenDates');
    if (showHidden === 'true') {
        document.getElementById('show-hidden-dates').checked = true;
    }
    
    // Add sort click handler on thead
    document.querySelector('thead').addEventListener('click', function(e) {
        if (justResized) { justResized = false; return; }
        const th = e.target.closest('th');
        if (!th) return;
        const col = th.getAttribute('data-col');
        if (col) sortBy(col);
    });
    
    const saved = localStorage.getItem('jobsData');
    if (saved) {
        try {
            jobs = JSON.parse(saved);
            // Only fix keys if they need fixing (trimming removes leading/trailing spaces)
            const firstJob = jobs[0] || {};
            const hasLeadingSpaces = Object.keys(firstJob).some(k => k !== k.trim());
            if (hasLeadingSpaces) {
                jobs = fixColumnKeys(jobs);
                convertSaabunudDates();
                localStorage.setItem('jobsData', JSON.stringify(jobs));
                showStatus('Andmed parandatud! (' + jobs.length + ' tööd)', 'success');
            } else {
                showStatus('Andmed taastatud! (' + jobs.length + ' tööd)', 'success');
                convertSaabunudDates();
            }
        } catch (e) {
            jobs = [];
        }
    } else {
        // Try to load from jobs_data.json
        fetch('jobs_data.json')
            .then(res => res.json())
            .then(data => {
                jobs = fixColumnKeys(data);
                convertSaabunudDates();
                localStorage.setItem('jobsData', JSON.stringify(jobs));
                renderTable();
                renderForm();
                updateStats();
                showStatus('Andmed laetud! (' + jobs.length + ' tööd)', 'success');
            })
            .catch(() => {
                showStatus('Kasuta "Laadi" nupu andmete laadimiseks!', 'success');
                renderTable();
                renderForm();
                updateStats();
            });
        return;
    }
    
    renderTable();
    renderForm();
    updateStats();
}

function renderTable() {
    const thead = document.querySelector('thead');
    let html = '<tr><th class="row-indicator"></th>';
    COLUMNS.forEach(col => {
        const isHidden = HIDDEN_COLS.includes(col) && !document.getElementById('show-hidden-dates').checked;
        if (isHidden) return;
        const label = COLUMN_LABELS[col] || col;
        const sortedClass = sortColumn === col ? 'sorted' : '';
        const hiddenClass = hiddenColumns[col] ? 'hidden-col' : '';
        const wrapClass = COLUMN_WRAP.includes(col) ? 'wrap-header' : '';
        const width = columnWidths[col] || COLUMN_WIDTHS[col] || 40;
        const arrow = sortColumn === col ? (sortDirection === 'asc' ? ' ▲' : ' ▼') : '';
        html += '<th class="' + sortedClass + ' ' + hiddenClass + ' ' + wrapClass + '" style="min-width: ' + width + 'px" data-col="' + col + '" title="' + col + '" onmousedown="startResize(event, this)">' + label + '<span class="sort-indicator">' + arrow + '</span></th>';
    });
    html += '</tr>';
    thead.innerHTML = html;
    renderTableBody();
}

function renderTableBody() {
    const tbody = document.getElementById('table-body');
    const filterNr = document.getElementById('filter-nr').value.toLowerCase();
    const filterKoht = document.getElementById('filter-koht').value.toLowerCase();
    const showCompleted = document.getElementById('show-completed').checked;
    const showAllhankes = document.getElementById('show-allhankes').checked;
    
    let filteredJobs = jobs.map((job, index) => ({ job, index }))
        .filter(({ job }) => {
            const valmis = job['Valmis'];
            if (valmis && !showCompleted) return false;
            const allhankes = job['Töötlus allhankes'];
            if (allhankes && !showAllhankes) return false;
            const nrMatch = !filterNr || (job['Töö Nr'] || '').toLowerCase().includes(filterNr);
            const kohtMatch = !filterKoht || (job['Täitmise koht'] || '').toLowerCase().includes(filterKoht);
            return nrMatch && kohtMatch;
        });
    
    if (sortColumn) {
        filteredJobs.sort((a, b) => {
            let valA = a.job[sortColumn], valB = b.job[sortColumn];
            if (valA === null || valA === undefined) valA = '';
            if (valB === null || valB === undefined) valB = '';
            if (typeof valA === 'boolean') { valA = valA ? 1 : 0; valB = valB ? 1 : 0; }
            else if (DATE_COLS.includes(sortColumn)) { valA = valA ? new Date(valA).getTime() : 0; valB = valB ? new Date(valB).getTime() : 0; }
            else { valA = String(valA).toLowerCase(); valB = String(valB).toLowerCase(); }
            if (valA < valB) return sortDirection === 'asc' ? -1 : 1;
            if (valA > valB) return sortDirection === 'asc' ? 1 : -1;
            return 0;
        });
    }
    
     let html = '';
     const statusColors = { 'waiting': '#94a3b8', 'in-progress': '#f59e0b', 'ok': '#22c55e', 'soon': '#eab308', 'overdue': '#ef4444', 'completed': '#94a3b8' };
     
     filteredJobs.forEach(({ job, index }) => {
         const status = getStatus(job);
         const valmis = job['Valmis'];
         const statusColor = statusColors[status] || statusColors.waiting;
         html += '<tr class="' + (valmis ? 'done-row' : '') + '" data-index="' + index + '">';
         html += '<td class="row-indicator" style="background-color: ' + statusColor + '"></td>';
         
        COLUMNS.forEach(col => {
            const value = job[col];
            const isCheckbox = CHECKBOX_COLS.includes(col);
            const isDate = DATE_COLS.includes(col);
            const isHidden = hiddenColumns[col] || (HIDDEN_COLS.includes(col) && !document.getElementById('show-hidden-dates').checked);
            if (isHidden) return;
            const width = columnWidths[col] || COLUMN_WIDTHS[col] || 40;
            let colEscaped = col.replace(/'/g, "\\'");
            
            if (isCheckbox) {
                html += '<td style="min-width: ' + width + 'px"><input type="checkbox" class="checkbox" ' + (value ? 'checked' : '') + ' onchange="toggleField(' + index + ', \'' + colEscaped + '\', this.checked)"></td>';
            } else {
                const displayValue = isDate ? formatDate(value) : (value || '');
                html += '<td style="min-width: ' + width + 'px" data-index="' + index + '" data-col="' + colEscaped + '" title="' + displayValue + '">' + displayValue + '</td>';
            }
        });
         html += '</tr>';
     });
     
tbody.innerHTML = html;
      
      // Add click handlers to non-checkbox cells
      tbody.querySelectorAll('td').forEach(td => {
          if (td.querySelector('input')) return;
          const colAttr = td.getAttribute('data-col');
          if (!colAttr) return;
          const col = colAttr.replace(/\\'/g, "'");
          if (DATE_COLS.includes(col)) {
              // Date columns: open calendar on click
              td.addEventListener('click', function(e) {
                  e.stopPropagation();
                  const index = parseInt(this.getAttribute('data-index'));
                  const colVal = this.getAttribute('data-col').replace(/\\'/g, "'");
                  const value = jobs[index][colVal] || '';
                  const colEscaped = colVal.replace(/'/g, "\\'");
                  openDateCalendarDirect(td, index, colEscaped, value);
              });
              return;
          }
          td.addEventListener('click', function() {
              if (editingCell && editingCell.td === this) return;
              const index = parseInt(this.getAttribute('data-index'));
              editCell(this, index, col);
          });
      });
}

function sortBy(col) {
    if (sortColumn === col) { sortDirection = sortDirection === 'asc' ? 'desc' : 'asc'; }
    else { sortColumn = col; sortDirection = 'asc'; }
    renderTable();
}

function editCell(td, index, col) {
    if (editingCell) finishEditing();
    const job = jobs[index];
    const value = job[col] || '';
    const isDate = DATE_COLS.includes(col);
    if (isDate) {
        // Date columns handled in renderTableBody - shouldn't reach here
        return;
    } else {
        const rows = Math.max(2, Math.ceil(value.length / 40));
        td.innerHTML = '<textarea style="width: 100%;" rows="' + rows + '" onblur="saveEdited(this, ' + index + ', \'' + col + '\')" onkeydown="if(event.key===\'Enter\'){event.preventDefault();saveEdited(this, ' + index + ', \'' + col + '\');}">' + value + '</textarea>';
        td.classList.add('editing');
        const input = td.querySelector('textarea');
        input.focus();
        input.setSelectionRange(input.value.length, input.value.length);
    }
    editingCell = { td, index, col, isDate };
}

// Auto-save helper
function autoSave() {
    try {
        localStorage.setItem('jobsData', JSON.stringify(jobs));
    } catch (e) {}
}

function saveEdited(input, index, col) {
    let value = input.value;
    if (DATE_COLS.includes(col) && !/^\d{2}\.\d{2}\.\d{4}$/.test(value)) {
        value = parseDate(value);
    }
    jobs[index][col] = value;
    editingCell.td.innerHTML = DATE_COLS.includes(col) ? formatDate(value) : (value || '');
    editingCell.td.classList.remove('editing');
    editingCell = null;
    autoSave();
    renderTableBody();
    updateStats();
}

function finishEditing() {
    if (!editingCell) return;
    const value = jobs[editingCell.index][editingCell.col] || '';
    editingCell.td.innerHTML = value;
    editingCell.td.classList.remove('editing');
    editingCell = null;
}

function toggleField(index, col, value) {
    const today = new Date().toISOString().split('T')[0];
    if (col === 'Valmis') jobs[index]['Valmis kpv'] = value ? today : '';
    if (col === 'Alustatud') jobs[index]['Alustamise kpv'] = value ? today : '';
    jobs[index][col] = value;
    autoSave();
    renderTableBody();
    updateStats();
}

function filterTable() { renderTableBody(); updateStats(); }

function updateStats() {
    const total = jobs.length;
    const completed = jobs.filter(j => j['Valmis']).length;
    const active = total - completed;
    const inProgress = jobs.filter(j => j['Alustatud'] && !j['Valmis']).length;
    const overdue = jobs.filter(j => getStatus(j) === 'overdue').length;
    
    document.getElementById('count-active').textContent = active;
    document.getElementById('count-in-progress').textContent = inProgress;
    document.getElementById('count-overdue').textContent = overdue;
    document.getElementById('count-completed').textContent = completed;
}

function renderForm() {
    const grid = document.getElementById('form-grid');
    let html = '';
    const defaultDate = formatDate(new Date().toISOString().split('T')[0]);
    
    COLUMNS.forEach(col => {
        if (HIDDEN_COLS.includes(col)) return;
        const isCheckbox = CHECKBOX_COLS.includes(col);
        const isDate = DATE_COLS.includes(col);
        let inputHtml = '';
        if (isCheckbox) inputHtml = '<input type="checkbox" name="' + col + '">';
        else if (isDate) inputHtml = '<input type="text" name="' + col + '" value="' + defaultDate + '" placeholder="pp.kk.aaaa">';
        else if (col === 'Töö Nr') inputHtml = '<input type="text" name="' + col + '" required placeholder="W26001">';
        else if (col === 'Info sisestamise kuupäev') inputHtml = '<input type="text" name="' + col + '" value="' + defaultDate + '" placeholder="pp.kk.aaaa">';
        else inputHtml = '<input type="text" name="' + col + '">';
        const label = COLUMN_LABELS[col] || col;
        html += '<div class="form-group"><label>' + label + '</label>' + inputHtml + '</div>';
    });
    
    grid.innerHTML = html;
}

function openModal() {
    const today = formatDate(new Date().toISOString().split('T')[0]);
    document.querySelectorAll('#add-form input[type="text"]').forEach(i => {
        if (DATE_COLS.includes(i.name)) i.value = today;
        else i.value = '';
    });
    document.querySelectorAll('#add-form input[type="checkbox"]').forEach(i => i.checked = false);
    document.getElementById('modal').classList.add('active');
}

function closeModal() { document.getElementById('modal').classList.remove('active'); }

function addJob(e) {
    e.preventDefault();
    const form = document.getElementById('add-form');
    const job = {};
    COLUMNS.forEach(col => {
        const input = form.querySelector('[name="' + col + '"]');
        if (input) {
            let value = input.type === 'checkbox' ? input.checked : (input.value || '');
            if (DATE_COLS.includes(col)) value = parseDate(value);
            job[col] = value;
        } else job[col] = '';
    });
    jobs.push(job);
    autoSave();
    closeModal();
    renderTableBody();
    updateStats();
    showStatus('Töö lisatud!', 'success');
}

function saveData() {
    try {
        const data = JSON.stringify(jobs, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'jobs_data.json';
        a.click();
        URL.revokeObjectURL(url);
        showStatus('Andmed salvestatud!', 'success');
    } catch (e) {
        showStatus('Viga: ' + e.message, 'error');
    }
}

function loadFromFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            let raw = e.target.result;
            let data;
            
            if (raw.trim().startsWith('[')) {
                data = JSON.parse(raw);
            } else {
                const match = raw.match(/const\s+JOBS_DATA\s*=\s*(\[[\s\S]*\]);?/);
                if (match) {
                    data = JSON.parse(match[1]);
                } else {
                    throw new Error('Tundmatu formaat. Fail peab olema JSON array või const JOBS_DATA = [...]');
                }
            }
            
            jobs = fixColumnKeys(data);
            
            localStorage.setItem('jobsData', JSON.stringify(jobs));
            renderTableBody();
            updateStats();
            showStatus('Andmed laetud! (' + jobs.length + ' tööd)', 'success');
        } catch (err) {
            showStatus('Viga: ' + err.message, 'error');
        }
    };
    reader.readAsText(file);
}

function fixColumnKeys(data) {
    if (!Array.isArray(data)) return data;
    return data.map(job => {
        const fixed = {};
        Object.keys(job).forEach(key => {
            let newKey = key.trim();
            fixed[newKey] = job[key];
        });
        return fixed;
    });
}

function showStatus(message, type) {
    const bar = document.getElementById('status-bar');
    bar.textContent = message;
    bar.className = 'status-bar ' + type;
    bar.style.display = 'block';
    setTimeout(() => bar.style.display = 'none', 3000);
}

function clearData() {
    if (confirm('Kas tahad andmed kustutada? Laadi uuesti failist.')) {
        localStorage.removeItem('jobsData');
        jobs = [];
        renderTableBody();
        updateStats();
        showStatus('Andmed tühjatud!', 'success');
    }
}

document.addEventListener('keydown', function(e) {
    // CTRL+; inserts current date in TEXT fields (not date fields with calendar)
    if (editingCell && e.ctrlKey && e.key === ';') {
        if (!editingCell.isDate) {
            const input = editingCell.td.querySelector('input, textarea');
            if (input) {
                const today = new Date();
                const dd = String(today.getDate()).padStart(2, '0');
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const yyyy = today.getFullYear();
                input.value = dd + '.' + mm + '.' + yyyy;
            }
        }
        e.preventDefault();
        return;
    }
    if (editingCell) {
        if (e.key === 'Escape') {
            closeCalendarPopup();
            finishEditing();
            e.preventDefault();
        }
    } else {
        if (e.key === 'Escape') {
            closeCalendarPopup();
            e.preventDefault();
        } else if (e.key === ' ') {
            const active = document.activeElement;
            if (active && active.tagName === 'TD') {
                const checkbox = active.querySelector('input[type="checkbox"]');
                if (checkbox) {
                    checkbox.checked = !checkbox.checked;
                    checkbox.dispatchEvent(new Event('change'));
                    e.preventDefault();
                }
            }
        }
    }
});

// Start app
init();
</script>
